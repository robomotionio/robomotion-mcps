schema_version: 1
servers:
- name: azure-devops
  path: servers/azure-devops
  title: Azure DevOps
  summary: Microsoft's Azure DevOps MCP server. Tools for work items, repositories, pull requests, pipelines, test plans,
    and wikis across an Azure DevOps organization. Runs as a stdio subprocess via npx inside the agent sandbox; the personal
    access token enters the container only as a credproxy placeholder, swapped for the real token at TLS egress.
  version: 1.0.0
  author: Microsoft
  source_url: https://github.com/microsoft/azure-devops-mcp
  license: MIT
  category: Developer Tools
  tags:
  - azure-devops
  - microsoft
  - work-items
  - repos
  - pipelines
  - boards
  - stdio
  transport: stdio
  command: npx
  args:
  - -y
  - '@azure-devops/mcp'
  - ${AZURE_DEVOPS_ORG}
  url: ''
  headers: []
  timeout: 300
  egress_hosts:
  - dev.azure.com
  - '*.dev.azure.com'
  - login.microsoftonline.com
  env:
    required:
    - AZURE_DEVOPS_ORG
    optional:
    - AZURE_DEVOPS_PAT
  content_hash: cdb97625ac65
  files:
  - .robomotion/mcp.yaml
  - MCP.md
  - env.optional
  - env.required
- name: azure-mcp
  path: servers/azure-mcp
  title: Azure MCP Server
  summary: Microsoft's official Azure MCP server. Tools spanning 40+ Azure services — Resource Groups, Storage, Cosmos DB,
    Azure SQL, Monitor/Log Analytics, Key Vault, AKS, and more — built on the Azure SDK. Runs as a stdio subprocess inside
    the agent sandbox; the Entra service-principal credentials enter the container only as credproxy placeholders, swapped
    for the real values at TLS egress, so the sandbox never holds the secret.
  version: 1.0.0
  author: Microsoft
  source_url: https://github.com/microsoft/mcp/tree/main/servers/Azure.Mcp.Server
  license: MIT
  category: DevOps
  tags:
  - azure
  - microsoft
  - devops
  - cloud
  - storage
  - cosmos-db
  - sql
  - monitor
  - key-vault
  - stdio
  transport: stdio
  command: npx
  args:
  - -y
  - '@azure/mcp@latest'
  - server
  - start
  url: ''
  headers: []
  timeout: 300
  egress_hosts:
  - login.microsoftonline.com
  - management.azure.com
  env:
    required:
    - AZURE_TENANT_ID
    - AZURE_CLIENT_ID
    - AZURE_CLIENT_SECRET
    optional: []
  content_hash: f3cc5e81064a
  files:
  - .robomotion/mcp.yaml
  - MCP.md
  - env.required
- name: azure-resource-manager
  path: servers/azure-resource-manager
  title: Azure Resource Manager
  summary: Microsoft's Azure Resource Manager (ARM) MCP Server (preview), a cloud-hosted endpoint that gives agents first-class
    access to Azure infrastructure — generate, validate, and run Azure Resource Graph queries and deploy or manage ARM template
    deployments across all resource types. Authentication is interactive Microsoft Entra ID OAuth performed by the MCP client
    (no static token is bound), so no credproxy header placeholder ships; the agent never holds a long-lived secret.
  version: 1.0.0
  author: Microsoft
  source_url: https://github.com/Azure/Azure-Resource-Manager-MCP
  license: MIT
  category: DevOps
  tags:
  - azure
  - microsoft
  - devops
  - cloud
  - arm
  - resource-graph
  - deployments
  - entra
  - oauth
  transport: http
  command: ''
  args: []
  url: https://mcp.management.azure.com
  headers: []
  timeout: 300
  egress_hosts:
  - mcp.management.azure.com
  env:
    required: []
    optional: []
  content_hash: 15c03ee8d41b
  files:
  - .robomotion/mcp.yaml
