- name: digitalocean-accounts
  path: servers/digitalocean-accounts
  title: DigitalOcean Accounts
  summary: DigitalOcean's hosted "accounts" MCP server. Tools to get information about your DigitalOcean account, billing,
    balance, invoices, and SSH keys. Rides Robomotion credproxy — the personal access token is swapped into the Authorization
    header at egress; the sandbox sees only a placeholder.
