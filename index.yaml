  author: DigitalOcean
  source_url: https://github.com/digitalocean-labs/mcp-digitalocean
  license: MIT
  category: DevOps
  tags:
  - digitalocean
  - devops
  - cloud
  - account
  - billing
  - invoices
  - ssh-keys
  transport: http
  command: ''
  args: []
  url: https://accounts.mcp.digitalocean.com/mcp
  headers:
  - Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}
  timeout: 300
  egress_hosts:
  - accounts.mcp.digitalocean.com
  env:
    required:
    - DIGITALOCEAN_API_TOKEN
    optional: []
