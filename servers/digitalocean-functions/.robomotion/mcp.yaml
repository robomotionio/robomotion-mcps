type: mcp
name: digitalocean-functions
title: DigitalOcean Functions
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's hosted MCP server for serverless Functions. Tools to
  manage function namespaces, actions, packages, triggers, and activations.
  Rides Robomotion credproxy — the personal access token is swapped into the
  Authorization header at egress; the sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, serverless, functions, namespaces, triggers, cloud]
transport: http
url: https://functions.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - functions.mcp.digitalocean.com
