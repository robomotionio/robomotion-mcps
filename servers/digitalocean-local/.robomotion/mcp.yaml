type: mcp
name: digitalocean-local
title: DigitalOcean (Local)
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's MCP server run locally via npx. Same App Platform +
  database tooling as the remote server, but spawned as a stdio subprocess
  inside the agent sandbox using the bundled runtimes. The API token enters
  the container only as a credproxy placeholder; credproxy swaps it for the
  real token at TLS egress, so the sandbox never holds the secret.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, cloud, apps, databases, deploy, stdio]
transport: stdio
command: npx
args: ["@digitalocean/mcp", "--services", "apps,databases"]
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - api.digitalocean.com
