type: mcp
name: digitalocean-apps
title: DigitalOcean App Platform
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's hosted MCP server for App Platform. Tools to manage
  applications, including deployments and configurations. Rides Robomotion
  credproxy — the personal access token is swapped into the Authorization
  header at egress; the sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, cloud, apps, app-platform, deploy]
transport: http
url: https://apps.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - apps.mcp.digitalocean.com
