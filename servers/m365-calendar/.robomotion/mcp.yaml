type: mcp
name: m365-calendar
title: Microsoft 365 Calendar
author: Microsoft
version: 1.0.0
license: MIT
category: Productivity
summary: Microsoft 365 Calendar MCP server (Agent365). Tools for creating,
  updating, and deleting events, managing invites, and checking availability
  via the Microsoft Graph Calendar APIs. The endpoint host is fixed but your
  Microsoft Entra tenant ID is bound into the request path at hire time. Rides
  Robomotion credproxy — the sandbox sees only a placeholder for the tenant
  identifier, never a real secret.
source_url: https://github.com/microsoft/mcp
tags: [microsoft-365, calendar, outlook, microsoft-graph, agent365, events, scheduling]
transport: http
url: https://agent365.svc.cloud.microsoft/agents/tenants/${MICROSOFT_TENANT_ID}/servers/mcp_CalendarTools
headers: []
timeout: 300
# Endpoint host is fixed (agent365.svc.cloud.microsoft); only the tenant id
# lives in the path. credproxy refuses to substitute the placeholder for any
# other destination (placeholder-replay defense).
egress_hosts:
  - agent365.svc.cloud.microsoft
