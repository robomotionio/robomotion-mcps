type: mcp
name: digitalocean-marketplace
title: DigitalOcean Marketplace
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's hosted Marketplace MCP server. Tools to discover and
  manage DigitalOcean Marketplace applications. Rides Robomotion credproxy —
  the personal access token is swapped into the Authorization header at egress;
  the sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, cloud, marketplace, apps, deploy]
transport: http
url: https://marketplace.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - marketplace.mcp.digitalocean.com
