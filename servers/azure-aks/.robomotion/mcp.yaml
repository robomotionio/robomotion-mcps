type: mcp
name: azure-aks
title: Azure Kubernetes Service (AKS)
author: Microsoft
version: 1.0.0
license: MIT
category: DevOps
summary: Microsoft's AKS MCP server. Tools to inspect and operate Azure
  Kubernetes Service clusters, node pools, networking, and diagnostics via the
  Azure Resource Manager and kubectl. Runs as a stdio subprocess (official
  ghcr.io/azure/aks-mcp container) inside the agent sandbox; the Azure service
  principal credentials enter the container only as credproxy placeholders,
  swapped for the real values at TLS egress, so the sandbox never holds the
  secret.
source_url: https://github.com/Azure/aks-mcp
tags: [azure, aks, kubernetes, k8s, devops, cloud, containers, stdio]
transport: stdio
command: docker
args: ["run", "-i", "--rm", "ghcr.io/azure/aks-mcp:latest", "--transport", "stdio"]
timeout: 300
# Hosts the credentials may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - management.azure.com
  - login.microsoftonline.com
