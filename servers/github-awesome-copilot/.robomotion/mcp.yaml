type: mcp
name: github-awesome-copilot
title: GitHub Awesome-Copilot
author: Microsoft
version: 1.0.0
license: MIT
category: Developer Tools
summary: Microsoft's Awesome Copilot MCP server. Tools to search and load the
  community customizations published in the github/awesome-copilot repository —
  agents, prompts, instructions, skills, collections, and chat modes. Runs as a
  stdio subprocess (Docker container) inside the agent sandbox; no credentials
  are required, so nothing sensitive enters the sandbox.
source_url: https://github.com/microsoft/mcp-dotnet-samples/tree/main/awesome-copilot
tags: [github, copilot, prompts, instructions, agents, customizations, stdio]
transport: stdio
command: docker
args: ["run", "-i", "--rm", "ghcr.io/microsoft/mcp-dotnet-samples/awesome-copilot:latest"]
timeout: 300
# Hosts the server reaches at runtime. No credential is injected (this server
# takes no token), so credproxy substitution does not apply; the allowlist
# scopes where the stdio subprocess may fetch the awesome-copilot catalog from.
egress_hosts:
  - github.com
  - raw.githubusercontent.com
