type: mcp
name: wordpress
title: WordPress
author: Automattic
version: 1.0.0
license: GPL-2.0
category: Content
summary: WordPress MCP server. Tools for posts, pages, media, users, comments,
  and site settings via the WordPress REST API. Runs as a stdio subprocess
  inside the agent sandbox; the application-password credentials enter the
  container only as credproxy placeholders, swapped for the real values at
  TLS egress, so the sandbox never holds the secret.
source_url: https://github.com/Automattic/wordpress-mcp
tags: [wordpress, cms, content, posts, pages, rest-api, stdio]
transport: stdio
command: npx
args: ["-y", "@automattic/mcp-wordpress-remote"]
timeout: 300
# Destination is the user's own WordPress site (configured at hire time), so
# no fixed egress allowlist ships here. The deskbot binds the placeholder to
# the configured site host where it can derive one; otherwise the warn-mode
# rollout flag (CREDPROXY_DEST_ENFORCE) keeps it working until backfilled.
egress_hosts: []
