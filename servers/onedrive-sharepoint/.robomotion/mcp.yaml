type: mcp
name: onedrive-sharepoint
title: OneDrive and SharePoint
author: Microsoft
version: 1.0.0
license: MIT
category: Productivity
summary: OneDrive and SharePoint MCP server (Agent365). Tools to browse, search,
  read, and manage files and document libraries across OneDrive and SharePoint,
  grounded in your tenant via the Microsoft Graph ODSP APIs. The endpoint host
  is fixed but your Microsoft Entra tenant ID is bound into the request path at
  hire time. Rides Robomotion credproxy — the sandbox sees only a placeholder
  for the tenant identifier, never a real secret.
source_url: https://github.com/microsoft/mcp
tags: [onedrive, sharepoint, files, documents, microsoft-graph, agent365, productivity]
transport: http
url: https://agent365.svc.cloud.microsoft/agents/tenants/${MICROSOFT_TENANT_ID}/servers/mcp_ODSPRemoteServer
headers: []
timeout: 300
# Endpoint host is fixed (agent365.svc.cloud.microsoft); only the tenant id
# lives in the path. credproxy refuses to substitute the placeholder for any
# other destination (placeholder-replay defense).
egress_hosts:
  - agent365.svc.cloud.microsoft
