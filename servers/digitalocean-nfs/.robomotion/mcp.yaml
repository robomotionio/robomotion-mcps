type: mcp
name: digitalocean-nfs
title: DigitalOcean NFS
author: DigitalOcean
version: 1.0.0
license: MIT
category: Storage
summary: DigitalOcean's hosted MCP server for NFS. Tools to manage NFS file
  shares and file share snapshots. Rides Robomotion credproxy — the DigitalOcean
  personal access token is swapped into the Authorization header at egress; the
  sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, storage, nfs, file-shares, snapshots, cloud]
transport: http
url: https://nfs.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - nfs.mcp.digitalocean.com
