type: mcp
name: github
title: GitHub (Remote)
author: GitHub
version: 1.0.0
license: MIT
category: Developer Tools
summary: GitHub's official remote MCP server. Tools for repositories, issues,
  pull requests, Actions, code search, and more. Rides Robomotion credproxy —
  the personal access token is swapped into the Authorization header at egress;
  the sandbox sees only a placeholder.
source_url: https://github.com/github/github-mcp-server
tags: [github, git, repos, issues, pull-requests, actions, code-search]
transport: http
url: https://api.githubcopilot.com/mcp/
headers:
  - "Authorization=Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"
timeout: 300
