type: mcp
name: gcp-bigtable
title: Bigtable (Google Cloud)
author: Google
version: 1.0.0
license: Apache-2.0
category: Databases
summary: Google Cloud's managed remote MCP server for Cloud Bigtable. Tools to
  manage instances, clusters, tables, and IAM, plus read and query data through
  the Bigtable Admin API. Rides Robomotion credproxy — the Google Cloud OAuth
  access token is swapped into the Authorization header at egress; the sandbox
  sees only a placeholder.
source_url: https://docs.cloud.google.com/bigtable/docs/use-bigtable-mcp
tags: [google-cloud, gcp, bigtable, database, nosql, wide-column, http]
transport: http
url: https://bigtableadmin.googleapis.com/mcp
headers:
  - "Authorization=Bearer ${GOOGLE_CLOUD_ACCESS_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - bigtableadmin.googleapis.com
