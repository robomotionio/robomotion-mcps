type: mcp
name: digitalocean-docr
title: DigitalOcean Container Registry
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's hosted "docr" MCP server. Tools to manage Container
  Registry repositories, tags, manifests, and garbage collection. Rides
  Robomotion credproxy — the personal access token is swapped into the
  Authorization header at egress; the sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, container-registry, docr, docker, registry, deploy]
transport: http
url: https://docr.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - docr.mcp.digitalocean.com
