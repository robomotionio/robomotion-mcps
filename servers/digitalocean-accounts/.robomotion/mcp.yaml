type: mcp
name: digitalocean-accounts
title: DigitalOcean Accounts
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's hosted "accounts" MCP server. Tools to get information
  about your DigitalOcean account, billing, balance, invoices, and SSH keys.
  Rides Robomotion credproxy — the personal access token is swapped into the
  Authorization header at egress; the sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, cloud, account, billing, invoices, ssh-keys]
transport: http
url: https://accounts.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - accounts.mcp.digitalocean.com
