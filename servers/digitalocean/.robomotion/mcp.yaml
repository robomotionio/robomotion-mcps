type: mcp
name: digitalocean
title: DigitalOcean (Remote)
author: DigitalOcean
version: 1.0.0
license: MIT
category: DevOps
summary: DigitalOcean's hosted MCP server for App Platform — deploy, inspect, and
  manage apps, deployments, and databases. Rides Robomotion credproxy (the API
  token is swapped into the Authorization header at TLS egress; the sandbox only
  ever sees a placeholder).
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, devops, cloud, apps, databases, deploy]
transport: http
url: https://apps.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
