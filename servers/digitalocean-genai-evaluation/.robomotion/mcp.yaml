type: mcp
name: digitalocean-genai-evaluation
title: DigitalOcean GenAI Evaluation
author: DigitalOcean
version: 1.0.0
license: MIT
category: AI / ML
summary: DigitalOcean's hosted GenAI Evaluation MCP server. Tools to manage and
  run evaluation workflows on DigitalOcean's GenAI platform. Rides Robomotion
  credproxy — the personal access token is swapped into the Authorization header
  at egress; the sandbox sees only a placeholder.
source_url: https://github.com/digitalocean-labs/mcp-digitalocean
tags: [digitalocean, genai, evaluation, ai, ml, llm, workflows]
transport: http
url: https://genai-evaluation.mcp.digitalocean.com/mcp
headers:
  - "Authorization=Bearer ${DIGITALOCEAN_API_TOKEN}"
timeout: 300
# Hosts the token may egress to. credproxy refuses to substitute the
# placeholder for any other destination (placeholder-replay defense).
egress_hosts:
  - genai-evaluation.mcp.digitalocean.com
